<header class="navbar-shell">
  <div class="navbar-content">

    <!-- Logo -->
    <a class="brand" routerLink="/">
      <img src="assets/logotienda.png" alt="Tortas Yani" height="50">
      <span class="brand-name">Tortasyani</span>
    </a>

    <!-- Búsqueda SIEMPRE visible, igual que en la imagen -->
    <div class="searchbox" [class.searchbox--focus]="searchFocused">
      <input
        class="searchbox__input"
        type="text"
        placeholder="Buscar tortas, postres..."
        [(ngModel)]="terminoBusqueda"
        (keydown)="onKeyEnter($event)"
        (focus)="searchFocused = true"
        (blur)="searchFocused = false"
        autocomplete="off"
      />
      <button class="searchbox__btn" (click)="ejecutarBusqueda()" title="Buscar">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>

    <!-- Links desktop -->
    <nav class="nav-links d-none d-lg-flex">
      <a class="nl" routerLink="/"         routerLinkActive="nl--active" [routerLinkActiveOptions]="{exact:true}">Inicio</a>
      <a class="nl" routerLink="/about"    routerLinkActive="nl--active">Acerca de</a>
      <a class="nl" routerLink="/contact"  routerLinkActive="nl--active">Contacto</a>
      <a class="nl" routerLink="/products" routerLinkActive="nl--active">Productos</a>
    </nav>

    <!-- Acciones -->
    <div class="nav-actions">
      <a *ngIf="!isLoggedIn()" class="btn-session" routerLink="/iniciar">Iniciar Sesión</a>

      <div *ngIf="isLoggedIn()" class="user-menu">
        <button class="user-btn" (click)="toggleDropdown()">
          <span class="user-avatar">{{ (user?.nombre || 'U')[0].toUpperCase() }}</span>
          <span class="user-name">{{ user?.nombre || 'Mi cuenta' }}</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <div class="user-dropdown" *ngIf="dropdownOpen">
          <a class="ud-item" routerLink="/cuenta"        (click)="dropdownOpen=false">👤 Perfil</a>
          <a class="ud-item" routerLink="/configuracion" (click)="dropdownOpen=false">⚙️ Configuración</a>
          <a class="ud-item" routerLink="/pedidos"       (click)="dropdownOpen=false">🧾 Mis pedidos</a>
          <hr class="ud-divider">
          <a class="ud-item ud-item--danger" (click)="logout()">🚪 Cerrar sesión</a>
        </div>
      </div>

      <!-- Hamburguesa mobile -->
      <button class="hamburger d-lg-none" (click)="toggleMenu()" [class.hamburger--open]="menuMobileOpen" aria-label="Menú">
        <span></span><span></span><span></span>
      </button>
    </div>

  </div>

  <!-- Menú mobile -->
  <nav class="mobile-nav" [class.mobile-nav--open]="menuMobileOpen">
    <!-- Búsqueda en mobile dentro del menú -->
    <div class="mobile-search">
      <div class="searchbox searchbox--mobile" [class.searchbox--focus]="searchFocused">
        <input
          class="searchbox__input"
          type="text"
          placeholder="Buscar productos..."
          [(ngModel)]="terminoBusqueda"
          (keydown)="onKeyEnter($event)"
          (focus)="searchFocused = true"
          (blur)="searchFocused = false"
          autocomplete="off"
        />
        <button class="searchbox__btn" (click)="ejecutarBusqueda()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </div>
    </div>

    <a class="mn-link" routerLink="/"         routerLinkActive="mn-link--active" [routerLinkActiveOptions]="{exact:true}" (click)="menuMobileOpen=false">🏠 Inicio</a>
    <a class="mn-link" routerLink="/products" routerLinkActive="mn-link--active" (click)="menuMobileOpen=false">🎂 Productos</a>
    <a class="mn-link" routerLink="/about"    routerLinkActive="mn-link--active" (click)="menuMobileOpen=false">ℹ️ Acerca de</a>
    <a class="mn-link" routerLink="/contact"  routerLinkActive="mn-link--active" (click)="menuMobileOpen=false">📞 Contacto</a>
    <div class="mn-divider"></div>
    <a *ngIf="!isLoggedIn()" class="mn-link mn-link--cta" routerLink="/iniciar" (click)="menuMobileOpen=false">🔑 Iniciar Sesión</a>
    <ng-container *ngIf="isLoggedIn()">
      <a class="mn-link" routerLink="/cuenta"  (click)="menuMobileOpen=false">👤 Perfil</a>
      <a class="mn-link" routerLink="/pedidos" (click)="menuMobileOpen=false">🧾 Mis pedidos</a>
      <a class="mn-link mn-link--danger" (click)="logout(); menuMobileOpen=false">🚪 Cerrar sesión</a>
    </ng-container>
  </nav>
</header>
