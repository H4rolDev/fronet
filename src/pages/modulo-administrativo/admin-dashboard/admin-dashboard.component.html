<div class="dashboard">
  <div class="welcome-banner">
    <div class="welcome-text">
      <h1>¡Bienvenido, <span>{{ userName }}</span>! 🎂</h1>
      <p>Aquí tienes un resumen de tu pastelería hoy.</p>
    </div>
    <div class="welcome-deco">✨</div>
  </div>

  <div class="stats-grid">
    <div class="stat-card" routerLink="/admin/tortas">
      <div class="stat-icon pink">🎂</div>
      <div class="stat-info">
        <span class="stat-label">Tortas</span>
        <span class="stat-hint">Gestionar catálogo</span>
      </div>
      <div class="stat-arrow">→</div>
    </div>

    <div class="stat-card" routerLink="/admin/recetas">
      <div class="stat-icon rose">📋</div>
      <div class="stat-info">
        <span class="stat-label">Recetas</span>
        <span class="stat-hint">Ver recetas</span>
      </div>
      <div class="stat-arrow">→</div>
    </div>

    <div class="stat-card" routerLink="/admin/produccion">
      <div class="stat-icon caramel">🏭</div>
      <div class="stat-info">
        <span class="stat-label">Producción</span>
        <span class="stat-hint">Control de producción</span>
      </div>
      <div class="stat-arrow">→</div>
    </div>

    <div class="stat-card" routerLink="/admin/insumos">
      <div class="stat-icon choco">📦</div>
      <div class="stat-info">
        <span class="stat-label">Insumos</span>
        <span class="stat-hint">Stock de insumos</span>
      </div>
      <div class="stat-arrow">→</div>
    </div>
  </div>
</div>
