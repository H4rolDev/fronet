<div class="admin-shell">
  <!-- SIDEBAR -->
  <aside class="sidebar" [class.collapsed]="sidebarCollapsed">

    <!-- Brand -->
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 24h24M7 24V16M25 24V16M4 16c0-1.5 1.2-3 3-3h18c1.8 0 3 1.5 3 3" stroke="#F9C8D8" stroke-width="2" stroke-linecap="round"/>
          <path d="M11 13V10c0-2.8 2.2-5 5-5s5 2.2 5 5v3" stroke="#F9C8D8" stroke-width="2" stroke-linecap="round"/>
          <circle cx="16" cy="6.5" r="2" fill="#F4A0BC"/>
        </svg>
      </div>
      <div class="brand-text" *ngIf="!sidebarCollapsed">
        <span class="brand-name">Pastelería</span>
        <span class="brand-sub">Panel Admin</span>
      </div>
    </div>

    <!-- Toggle -->
    <button class="sidebar-toggle" (click)="toggleSidebar()" [title]="sidebarCollapsed ? 'Expandir' : 'Colapsar'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path *ngIf="!sidebarCollapsed" d="M15 18l-6-6 6-6"/>
        <path *ngIf="sidebarCollapsed"  d="M9 18l6-6-6-6"/>
      </svg>
    </button>

    <!-- Navigation -->
    <nav class="sidebar-nav">
      <div class="nav-section-label" *ngIf="!sidebarCollapsed">Gestión</div>

      <a class="nav-item" routerLink="/admin/tortas" routerLinkActive="active" [title]="sidebarCollapsed ? 'Tortas' : ''">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M3 19h18M5 19V12M19 19V12M3 12c0-1 .8-2 2-2h14c1.2 0 2 1 2 2"/>
            <path d="M8 10V8c0-2.2 1.8-4 4-4s4 1.8 4 4v2"/>
            <circle cx="12" cy="5" r="1.5" fill="currentColor"/>
          </svg>
        </div>
        <span class="nav-label">Tortas</span>
        <span class="nav-dot" *ngIf="!sidebarCollapsed"></span>
      </a>

      <a class="nav-item" routerLink="/admin/receta-torta" routerLinkActive="active" [title]="sidebarCollapsed ? 'Recetas' : ''">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
            <rect x="9" y="3" width="6" height="4" rx="1"/>
            <path d="M9 12h6M9 16h4"/>
          </svg>
        </div>
        <span class="nav-label">Recetas de Tortas</span>
        <span class="nav-dot" *ngIf="!sidebarCollapsed"></span>
      </a>

      <a class="nav-item" routerLink="/admin/produccion" routerLinkActive="active" [title]="sidebarCollapsed ? 'Producción' : ''">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M19.428 15.428a2 2 0 00-1.022-.54l-4.615-.92a4 4 0 00-3.582 0l-4.615.92a2 2 0 00-1.594 1.959V20h16v-3.152a2 2 0 00-.572-1.42z"/>
            <path d="M12 12V8M8 8h8"/>
            <circle cx="12" cy="6" r="2"/>
          </svg>
        </div>
        <span class="nav-label">Producción de Torta</span>
        <span class="nav-dot" *ngIf="!sidebarCollapsed"></span>
      </a>

      <a class="nav-item" routerLink="/admin/insumos" routerLinkActive="active" [title]="sidebarCollapsed ? 'Insumos' : ''">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/>
            <path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/>
            <line x1="12" y1="12" x2="12" y2="16"/>
            <line x1="10" y1="14" x2="14" y2="14"/>
          </svg>
        </div>
        <span class="nav-label">Insumos</span>
        <span class="nav-dot" *ngIf="!sidebarCollapsed"></span>
      </a>

      <a class="nav-item" routerLink="/admin/unidad-medida" routerLinkActive="active" [title]="sidebarCollapsed ? 'Unidad de Medida' : ''">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/>
            <path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/>
            <line x1="12" y1="12" x2="12" y2="16"/>
            <line x1="10" y1="14" x2="14" y2="14"/>
          </svg>
        </div>
        <span class="nav-label">Unidad de Medida</span>
        <span class="nav-dot" *ngIf="!sidebarCollapsed"></span>
      </a>

      <div class="nav-divider"></div>

      <button class="nav-item nav-logout" (click)="logout()" [title]="sidebarCollapsed ? 'Cerrar sesión' : ''">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </div>
        <span class="nav-label">Cerrar Sesión</span>
      </button>
    </nav>
  </aside>

  <!-- MAIN AREA -->
  <div class="admin-main">
    <!-- TOP HEADER -->
    <header class="admin-header">
      <div class="header-left">
        <div class="page-breadcrumb">
          <span class="breadcrumb-text">{{ currentPageTitle }}</span>
        </div>
      </div>

      <div class="header-right">
        <div class="header-date">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="date-icon">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <span>{{ currentDate }}</span>
        </div>

        <div class="header-user">
          <div class="user-info">
            <span class="user-name">{{ userName }}</span>
            <div class="user-meta">
              <span class="role-badge" *ngFor="let rol of userRoles">{{ rol }}</span>
              <span class="user-sub">· Sesión activa</span>
            </div>
          </div>
          <div class="user-avatar">{{ userInitials }}</div>
        </div>
      </div>
    </header>

    <!-- CONTENT -->
    <main class="admin-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
