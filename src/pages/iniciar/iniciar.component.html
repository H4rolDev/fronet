<div class="auth-container">
  <div class="auth-box">
    <h2 class="auth-title">
      {{ isRegisterMode ? 'Crear cuenta' : 'Bienvenido de nuevo' }}
    </h2>

    <form [formGroup]="isRegisterMode ? registerForm : loginForm" (ngSubmit)="isRegisterMode ? register() : login()"
      class="auth-form">
      
      @if (isRegisterMode) {
        <div class="form-row">
          <div class="form-group">
            <label for="nombres">Nombres <span class="req">*</span></label>
            <input type="text" id="nombres" formControlName="nombres" placeholder="Juan" />
          </div>
          <div class="form-group">
            <label for="apellidoPaterno">Apellido Paterno <span class="req">*</span></label>
            <input type="text" id="apellidoPaterno" formControlName="apellidoPaterno" placeholder="Pérez" />
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="apellidoMaterno">Apellido Materno</label>
            <input type="text" id="apellidoMaterno" formControlName="apellidoMaterno" placeholder="García" />
          </div>
          <div class="form-group">
            <label for="idTipoDocumento">Tipo Doc <span class="req">*</span></label>
            <select id="idTipoDocumento" formControlName="idTipoDocumento">
              <option [value]="1">DNI</option>
              <option [value]="2">RUC</option>
              <option [value]="3">Carnet Extranjería</option>
              <option [value]="4">Pasaporte</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="numeroDocumento">Número de Documento <span class="req">*</span></label>
          <input type="text" id="numeroDocumento" formControlName="numeroDocumento" placeholder="12345678" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="telefono">Teléfono</label>
            <input type="tel" id="telefono" formControlName="telefono" placeholder="999 888 777" />
          </div>
          <div class="form-group">
            <label for="direccion">Dirección</label>
            <input type="text" id="direccion" formControlName="direccion" placeholder="Av. Principal 123" />
          </div>
        </div>
      }

      <div class="form-group">
        <label for="username">Usuario <span class="req">*</span></label>
        <input type="text" id="username" formControlName="username" placeholder="Tu usuario" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="password">Contraseña <span class="req">*</span></label>
          <input type="password" id="password" formControlName="password" placeholder="••••••••" />
        </div>
        @if (isRegisterMode) {
          <div class="form-group">
            <label for="confirmarPassword">Confirmar <span class="req">*</span></label>
            <input type="password" id="confirmarPassword" formControlName="confirmarPassword" placeholder="••••••••" />
          </div>
        }
      </div>

      <button type="submit" class="submit-btn" [disabled]="isLoading">
        <span *ngIf="!isLoading">{{ isRegisterMode ? 'Registrarse' : 'Ingresar' }}</span>
        <span *ngIf="isLoading">Cargando...</span>
      </button>
    </form>

    <div class="toggle-mode">
      <span (click)="toggleMode()">
        {{ isRegisterMode ? '¿Ya tienes cuenta? Inicia sesión' : '¿No tienes cuenta? Regístrate' }}
      </span>
    </div>

    <div *ngIf="message" class="auth-message" [class.error]="message.includes('Error') || message.includes('no')">
      {{ message }}
    </div>
  </div>
</div>
